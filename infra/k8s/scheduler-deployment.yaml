apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: kubeservelab
spec:
  selector:
    app: scheduler
  ports:
    - port: 8080
      targetPort: 8080
      name: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: kubeservelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: kubeservelab/scheduler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: health
          envFrom:
            - configMapRef:
                name: kubeservelab-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
