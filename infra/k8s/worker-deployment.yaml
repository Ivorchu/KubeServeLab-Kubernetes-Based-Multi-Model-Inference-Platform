apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: kubeservelab
spec:
  selector:
    app: worker
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  clusterIP: None  # headless — each pod gets its own DNS entry for scraping
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kubeservelab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: worker
          image: kubeservelab/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: metrics
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: kubeservelab-config
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
