global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

scrape_configs:
  # ── Docker Compose static targets ──────────────────────────────────────────
  # Used when running via docker compose --profile monitoring up
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
        labels:
          app: api

  - job_name: worker
    static_configs:
      - targets: ["worker:9090"]
        labels:
          app: worker

  # ── Kubernetes pod auto-discovery ──────────────────────────────────────────
  # Used when deployed to a Kubernetes cluster.
  # Pods must have annotation prometheus.io/scrape: "true".
  # This job silently no-ops in Docker Compose (no K8s API to connect to).
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [kubeservelab]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: namespace
